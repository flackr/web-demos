<!DOCTYPE html>
<html>
  <head>
    <style>
      #container {
        width: 300px;
        height: 300px;
        background: white;
        font-size: 64px;
        line-height: 300px;
        text-align: center;
      }
      #up, #down, #left, #right {
        color: white;
        width: 100%;
        height: 100%;
      }
      #up::before, #down::before, #left::before, #right::before, #container::before {
        content: "#" attr(id);
      }
      #up {
        top: -100%;
        background: red;
      }
      #left {
        left: -100%;
        background: green;
      }
      #right {
        left: 100%;
        background: blue;
      }
      #down {
        top: 100%;
        background: rebeccapurple;
      }
      #log {
        white-space: pre;
        &::before {
          content: "Events:";
        }
      }
    </style>
  </head>
  <body>
    <div id="container" overscrollcontainer>
      <div id="up" overscrollarea></div>
      <div id="down" overscrollarea></div>
      <div id="left" overscrollarea></div>
      <div id="right" overscrollarea></div>
    </div>
    <div id="log"></div>
  </body>
  <script>
    const container = document.getElementById("container");
    const log = document.getElementById("log");
    for (const eventType of ['overscrollstart', 'overscrollchanging', 'overscrollend', 'overscrollcancel']) {
      container.addEventListener(eventType, (evt) => {
        function attr(attrName) {
          const value = evt[attrName];
          if (value === true) return ` ${attrName}=true`;
          if (value === false) return ` ${attrName}=false`;
          if (typeof value === 'string') return ` ${attrName}="${value}"`;
          if (typeof value === 'number') return ` ${attrName}=${value}`;
          if (value instanceof Element) return ` ${attrName}=#${value.id}`;
          return '';
        }
        
        const details = `${evt.type}${attr('overscrollTarget')}${attr('overscrolling')}`;
        log.textContent += `\n${details}`;
      });
    }
  </script>
</html>
